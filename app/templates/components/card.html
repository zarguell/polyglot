<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-6 shadow-sm">
  {% if title %}<h3 class="text-sm font-medium text-gray-900 dark:text-gray-100 mb-2">{{ title }}</h3>{% endif %}
  {% if content %}<p class="text-sm text-gray-500 dark:text-gray-400">{{ content }}</p>{% endif %}
  {{ caller() if caller else '' }}
</div>

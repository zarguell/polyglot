<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="app-name" content="{{ app_name }}">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ static('app.css') }}?v=1">
  {% block extra_head %}{% endblock %}
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
          integrity="{{ sri('htmx') }}" crossorigin="anonymous"></script>
  <script nonce="{{ request.state.nonce }}">
    document.body.addEventListener('htmx:configRequest', (e) => {
      e.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]')?.content ?? '';
    });
  </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">
  {% block layout %}
  <div class="min-h-full flex flex-col">
    {% block nav %}{% endblock %}
    <main class="flex-1">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>

<span class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium
  {%- if settings.environment == 'production' %} bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300
  {%- elif settings.environment == 'staging' %} bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300
  {%- else %} bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300{% endif %}">
  {{ settings.environment }}
</span>

# Local development overrides
# Add optional profiles below. Activate via: docker compose --profile <name> up
services:
  postgres:
    ports:
      - "5432:5432"

  app:
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    volumes:
      - .:/app

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles:
      - mailhog

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@polyglot.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - pgadmin

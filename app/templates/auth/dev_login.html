{% extends "base.html" %}
{% block title %}{{ app_name }} — Dev Login{% endblock %}
{% block nav %}{% include "components/nav.html" %}{% endblock %}
{% block content %}
<div class="mx-auto max-w-sm px-4 py-16">
  <div class="rounded-xl border border-red-200 dark:border-red-900 bg-red-50 dark:bg-red-950 p-4 mb-6 text-sm text-red-700 dark:text-red-300 text-center">
    ⚠️ DEV MODE — DO NOT USE IN PRODUCTION
  </div>
  <h1 class="text-xl font-semibold text-center mb-6">Dev Login</h1>
  <form action="/login/dev" method="post" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label for="email" class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" id="email" required
             class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-2 text-sm">
    </div>
    <div>
      <label for="display_name" class="block text-sm font-medium mb-1">Display Name</label>
      <input type="text" name="display_name" id="display_name"
             class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-2 text-sm">
    </div>
    <button type="submit"
            class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-500">
      Sign in (Dev)
    </button>
  </form>
</div>
{% endblock %}
